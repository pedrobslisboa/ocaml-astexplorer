name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.0"

      - name: Install opam dependencies
        run: opam install . --deps-only --yes
        working-directory: refmt

      - name: Build refmt
        run: |
          opam exec -- dune build
          mkdir -p dist
          cp _build/default/src/ast_explorer_refmt.bc.js dist/
        working-directory: refmt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn
        working-directory: website

      - name: Build
        run: yarn build
        working-directory: website
        env:
          NODE_OPTIONS: --openssl-legacy-provider --preserve-symlinks
          NODE_ENV: production
          PUBLIC_PATH: /ocaml-astexplorer/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
